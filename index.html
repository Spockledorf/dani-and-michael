<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Who Said It?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="stage">
    
    <header class="masthead">
      <div class="eyebrow">Level <span id="level-display">1</span></div>
      <h1>Who Said It?</h1>
      <div class="sub">Dani or Michael?</div>
    </header>

    <div class="top-actions">
      <button class="link-btn" id="start-over-btn">Start Over</button>
    </div>

    <div class="tabs" id="progress-tabs"></div>

    <!-- Active Gameplay Card -->
    <div class="card" id="game-card">
      <div class="seal-wrap" id="seal-wrap">
        <div class="seal" id="seal-text">Yes</div>
      </div>
      
      <div class="quote-mark">"</div>
      <div class="quote-text" id="quote-text">Loading quote...</div>
      
      <div class="choices">
        <button class="choice" id="btn-a">Dani</button>
        <button class="choice" id="btn-b">Michael</button>
      </div>
      
      <div class="footline">
        <span id="question-counter">1 of 5</span>
      </div>
      
      <button class="next-btn" id="next-btn">Next Quote</button>
    </div>

    <!-- Results Overview -->
    <div class="card results hidden" id="results-card">
      <div class="big-score" id="score-display">0</div>
      <div class="of" id="score-total">of 5</div>
      <p class="verdict" id="verdict-text"></p>
      <button class="replay-btn" id="continue-btn">Next Level</button>
      <div class="pool-note">You must score at least 40% to advance.</div>
    </div>

    <!-- Session History List -->
    <div class="list-card hidden" id="history-card">
      <div class="list-header">
        <span>Quotes From This Round</span>
        <span>Answer</span>
      </div>
      <div id="history-list"></div>
    </div>

  </main>

  <!-- External Quotes Reference -->
  <script src="quotes.js"></script>

  <!-- Game Logic Implementation -->
  <script>
    const CONFIG = {
      partnerA: "Dani",
      partnerB: "Michael"
    };

    // Global State Variables
    let usedQuotes = []; 
    let currentRunHistory = []; 
    let currentLevel = 1; 
    let currentQuestions = [];
    let currentIndex = 0;
    let correctCount = 0;

    const LEVEL_CONFIG = {
      1: { questionCount: 5 },
      2: { questionCount: 10 },
      3: { questionCount: 15 },
      4: { questionCount: 20 },
      5: { questionCount: 25 }
    };

    // DOM Elements
    const elements = {
      levelDisplay: document.getElementById('level-display'),
      tabs: document.getElementById('progress-tabs'),
      gameCard: document.getElementById('game-card'),
      resultsCard: document.getElementById('results-card'),
      historyCard: document.getElementById('history-card'),
      historyList: document.getElementById('history-list'),
      quoteText: document.getElementById('quote-text'),
      btnA: document.getElementById('btn-a'),
      btnB: document.getElementById('btn-b'),
      nextBtn: document.getElementById('next-btn'),
      sealWrap: document.getElementById('seal-wrap'),
      sealText: document.getElementById('seal-text'),
      counter: document.getElementById('question-counter'),
      startOverBtn: document.getElementById('start-over-btn'),
      continueBtn: document.getElementById('continue-btn'),
      scoreDisplay: document.getElementById('score-display'),
      scoreTotal: document.getElementById('score-total'),
      verdictText: document.getElementById('verdict-text')
    };

    function initLevel() {
      const config = LEVEL_CONFIG[currentLevel] || LEVEL_CONFIG[5]; // Default to max if they go past 5
      let availableQuotes = QUOTES.filter(q => !usedQuotes.includes(q.text));
      
      // Shuffle the entire remaining pool
      let pool = availableQuotes.sort(() => Math.random() - 0.5); 
      currentQuestions = pool.slice(0, config.questionCount);
      
      currentIndex = 0;
      correctCount = 0;
      currentRunHistory = [];
      elements.levelDisplay.innerText = currentLevel;
      
      buildTabs();
      showCard('game');
      loadQuestion();
    }

    function buildTabs() {
      elements.tabs.innerHTML = '';
      for(let i = 0; i < currentQuestions.length; i++){
        let tab = document.createElement('div');
        tab.className = 'tab';
        if(i === 0) tab.classList.add('current');
        elements.tabs.appendChild(tab);
      }
    }

    function loadQuestion() {
      resetStyles();
      const q = currentQuestions[currentIndex];
      elements.quoteText.innerText = q.text;
      elements.counter.innerText = `${currentIndex + 1} of ${currentQuestions.length}`;
      
      // Update Tab Visuals
      Array.from(elements.tabs.children).forEach((t, i) => {
        t.classList.remove('current');
        if(i === currentIndex) t.classList.add('current');
      });
    }

    function handleGuess(guess) {
      if(elements.btnA.disabled) return; 
      
      const q = currentQuestions[currentIndex];
      const isCorrect = guess === q.answer;
      
      if(isCorrect) correctCount++;
      
      usedQuotes.push(q.text);
      currentRunHistory.push({
        text: q.text,
        actual: q.answer
      });

      // Styling updates based on guess
      const clickedBtn = guess === 'A' ? elements.btnA : elements.btnB;
      clickedBtn.classList.add(isCorrect ? 'correct' : 'incorrect');
      
      elements.btnA.disabled = true;
      elements.btnB.disabled = true;

      // Update progress tab
      const currentTab = elements.tabs.children[currentIndex];
      currentTab.classList.remove('current');
      currentTab.classList.add(isCorrect ? 'done' : 'wrong');

      // Show Wax Seal
      elements.sealText.innerText = isCorrect ? 'Yes' : 'No';
      elements.sealText.className = `seal ${isCorrect ? 'yes' : 'no'}`;
      elements.sealWrap.classList.add('show');
      
      elements.nextBtn.classList.add('show');
    }

    function resetStyles() {
      elements.btnA.disabled = false;
      elements.btnB.disabled = false;
      elements.btnA.className = 'choice';
      elements.btnB.className = 'choice';
      elements.sealWrap.classList.remove('show');
      elements.nextBtn.classList.remove('show');
    }

    function nextAction() {
      if(currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        loadQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      showCard('results');
      const total = currentQuestions.length;
      const passPercentage = correctCount / total;
      
      elements.scoreDisplay.innerText = correctCount;
      elements.scoreTotal.innerText = `of ${total}`;
      
      if(passPercentage >= 0.40) {
        elements.verdictText.innerText = "Nice work! You've unlocked the next level.";
        elements.continueBtn.innerText = "Next Level";
        elements.continueBtn.onclick = () => {
          currentLevel++;
          initLevel();
        };
      } else {
        elements.verdictText.innerText = "You missed a few too many! Try again to unlock the next level.";
        elements.continueBtn.innerText = "Try Level Again";
        elements.continueBtn.onclick = initLevel;
      }

      renderHistory();
    }

    function renderHistory() {
      elements.historyList.innerHTML = '';
      currentRunHistory.forEach(item => {
        const div = document.createElement('div');
        div.className = 'list-item';
        
        const who = document.createElement('div');
        who.className = 'who';
        who.innerText = item.actual === 'A' ? CONFIG.partnerA : CONFIG.partnerB;
        
        const text = document.createElement('div');
        text.className = 'text';
        text.innerText = item.text;
        
        div.appendChild(who);
        div.appendChild(text);
        elements.historyList.appendChild(div);
      });
      elements.historyCard.classList.remove('hidden');
    }

    function showCard(view) {
      elements.gameCard.classList.add('hidden');
      elements.resultsCard.classList.add('hidden');
      elements.historyCard.classList.add('hidden');
      
      if(view === 'game') elements.gameCard.classList.remove('hidden');
      if(view === 'results') elements.resultsCard.classList.remove('hidden');
    }

    function resetGame() {
      usedQuotes = [];
      currentLevel = 1;
      initLevel();
    }

    // Event Listeners
    elements.btnA.addEventListener('click', () => handleGuess('A'));
    elements.btnB.addEventListener('click', () => handleGuess('B'));
    elements.nextBtn.addEventListener('click', nextAction);
    elements.startOverBtn.addEventListener('click', resetGame);

    // Boot Up
    initLevel();
  </script>
</body>
</html>
