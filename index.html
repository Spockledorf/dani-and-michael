<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who Said It? — A Quote Quiz</title>
<!-- ============================================================
     Three files work together, keep them in the same folder:
       - index.html  (this file — structure and quiz logic)
       - styles.css  (all visual styling)
       - quotes.js   (the quotes themselves — edit this for content)
     ============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Work+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>
<body>

<div class="stage">
  <div class="masthead">
    <div class="eyebrow" id="eyebrow-text">Who said it?</div>
    <h1 id="title-text">The Quote Quiz</h1>
    <div class="sub" id="sub-text">Guess who said what</div>
  </div>

  <div class="top-actions">
    <button class="link-btn" id="show-list-btn">View all quotes</button>
    <button class="link-btn" id="reset-pool-btn">Reset &amp; reshuffle</button>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="card" id="quiz-card">
    <div class="seal-wrap" id="seal-wrap">
      <div class="seal" id="seal"></div>
    </div>
    <div class="quote-mark">“</div>
    <div class="quote-text" id="quote-text"></div>
    <div class="choices" id="choices"></div>
    <button class="next-btn" id="next-btn">Next quote →</button>
    <div class="footline">
      <span id="progress-label"></span>
      <span id="score-label"></span>
    </div>
  </div>

  <div class="card results hidden" id="results-card">
    <div class="eyebrow" style="color:var(--teal)">Final tally</div>
    <div class="big-score" id="final-score">0</div>
    <div class="of" id="final-of"></div>
    <p class="verdict" id="verdict-text"></p>
    <button class="replay-btn" id="replay-btn">Play again</button>
    <div class="pool-note" id="pool-note"></div>
  </div>

  <div class="list-card hidden" id="list-card">
    <div class="list-header">
      <span id="list-count"></span>
      <button class="link-btn" id="back-to-quiz-btn">← Back to quiz</button>
    </div>
    <div id="list-items"></div>
  </div>
</div>

<!-- Quotes live in their own file so they're easy to edit -->
<script src="quotes.js"></script>
<script>
/* ============================================================
   CONFIG — edit names, quiz length, and closing messages here.
   The actual quotes are in quotes.js, not here.
   ============================================================ */
const CONFIG = {
  partnerA: "Sam",
  partnerB: "Jess",
  eyebrow: "Who said it?",
  title: "The Quote Quiz",
  subtitle: "Guess which of us said what",

  // How many quotes make up one round. With ~150 quotes in the
  // pool, 10-12 per round keeps it snappy for party guests.
  roundLength: 10,

  // Shown at the end, based on score percentage this round.
  // Lowest threshold the score meets or beats is used — keep
  // these ordered high to low.
  verdicts: [
    { min: 1.0,  text: "Certified expert on both of us. Slightly concerning, mostly impressive." },
    { min: 0.75, text: "You clearly pay attention. Respect." },
    { min: 0.5,  text: "A solid guess-timate. You know one of us better than the other." },
    { min: 0.0,  text: "You had fun, and that's what actually matters here." },
  ]
};
/* ============================================================ */

let pool = [];        // shuffled full quote list, drawn down as rounds are played
let round = [];        // current round's quotes
let current = 0;
let score = 0;
let answered = false;
const results = [];

const els = {
  tabs: document.getElementById('tabs'),
  quoteText: document.getElementById('quote-text'),
  choices: document.getElementById('choices'),
  nextBtn: document.getElementById('next-btn'),
  progressLabel: document.getElementById('progress-label'),
  scoreLabel: document.getElementById('score-label'),
  sealWrap: document.getElementById('seal-wrap'),
  seal: document.getElementById('seal'),
  quizCard: document.getElementById('quiz-card'),
  resultsCard: document.getElementById('results-card'),
  finalScore: document.getElementById('final-score'),
  finalOf: document.getElementById('final-of'),
  verdictText: document.getElementById('verdict-text'),
  poolNote: document.getElementById('pool-note'),
  replayBtn: document.getElementById('replay-btn'),
  listCard: document.getElementById('list-card'),
  listItems: document.getElementById('list-items'),
  listCount: document.getElementById('list-count'),
  showListBtn: document.getElementById('show-list-btn'),
  backToQuizBtn: document.getElementById('back-to-quiz-btn'),
  resetPoolBtn: document.getElementById('reset-pool-btn'),
};

document.getElementById('eyebrow-text').textContent = CONFIG.eyebrow;
document.getElementById('title-text').textContent = CONFIG.title;
document.getElementById('sub-text').textContent = CONFIG.subtitle;

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetPool(){
  pool = shuffle(QUOTES);
}

function drawRound(){
  // If the pool doesn't have enough left for a full round, reshuffle
  // in whatever's left over so nothing repeats mid-round, then top
  // up from a fresh shuffle for next time.
  if (pool.length < CONFIG.roundLength){
    resetPool();
  }
  round = pool.splice(0, CONFIG.roundLength);
  current = 0;
  score = 0;
  results.length = 0;
}

function buildTabs(){
  els.tabs.innerHTML = '';
  round.forEach((_, i) => {
    const t = document.createElement('div');
    t.className = 'tab';
    t.id = 'tab-' + i;
    els.tabs.appendChild(t);
  });
  updateTabs();
}

function updateTabs(){
  round.forEach((_, i) => {
    const t = document.getElementById('tab-' + i);
    t.className = 'tab' +
      (i === current ? ' current' : '') +
      (results[i] === true ? ' done' : '') +
      (results[i] === false ? ' wrong' : '');
  });
}

function renderQuote(){
  answered = false;
  const q = round[current];
  els.quoteText.textContent = q.text;
  els.choices.innerHTML = '';
  els.sealWrap.classList.remove('show');
  els.nextBtn.classList.remove('show');

  [['A', CONFIG.partnerA], ['B', CONFIG.partnerB]].forEach(([key, name]) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = name;
    btn.addEventListener('click', () => handleAnswer(key, btn));
    els.choices.appendChild(btn);
  });

  els.progressLabel.textContent = `Quote ${current + 1} of ${round.length}`;
  els.scoreLabel.textContent = `Score: ${score}`;
  updateTabs();
}

function handleAnswer(key, btn){
  if (answered) return;
  answered = true;
  const q = round[current];
  const correct = key === q.answer;
  results[current] = correct;
  if (correct) score++;

  [...els.choices.children].forEach(child => {
    child.disabled = true;
    const isThisCorrectAnswer =
      (child.textContent === CONFIG.partnerA && q.answer === 'A') ||
      (child.textContent === CONFIG.partnerB && q.answer === 'B');
    if (isThisCorrectAnswer) child.classList.add('correct');
    if (child === btn && !correct) child.classList.add('incorrect');
  });

  els.seal.textContent = correct ? 'Correct' : 'Nice try';
  els.seal.className = 'seal ' + (correct ? 'yes' : 'no');
  els.sealWrap.classList.add('show');

  els.scoreLabel.textContent = `Score: ${score}`;
  updateTabs();

  els.nextBtn.textContent = current === round.length - 1 ? 'See results →' : 'Next quote →';
  els.nextBtn.classList.add('show');
}

els.nextBtn.addEventListener('click', () => {
  current++;
  if (current >= round.length){
    showResults();
  } else {
    renderQuote();
  }
});

function showResults(){
  els.quizCard.classList.add('hidden');
  els.resultsCard.classList.remove('hidden');
  els.finalScore.textContent = score;
  els.finalOf.textContent = `out of ${round.length}`;
  const pct = score / round.length;
  const verdict = CONFIG.verdicts.find(v => pct >= v.min) || CONFIG.verdicts[CONFIG.verdicts.length - 1];
  els.verdictText.textContent = verdict.text;
  els.poolNote.textContent = pool.length > 0
    ? `${pool.length} quotes left before the set repeats.`
    : `That's the whole set — next round reshuffles from the top.`;
}

els.replayBtn.addEventListener('click', () => {
  els.resultsCard.classList.add('hidden');
  els.quizCard.classList.remove('hidden');
  drawRound();
  buildTabs();
  renderQuote();
});

els.resetPoolBtn.addEventListener('click', () => {
  resetPool();
  els.resultsCard.classList.add('hidden');
  els.quizCard.classList.remove('hidden');
  drawRound();
  buildTabs();
  renderQuote();
});

/* ---------- all-quotes list view ---------- */
function renderList(){
  els.listItems.innerHTML = '';
  els.listCount.textContent = `${QUOTES.length} quotes — answers shown`;
  QUOTES.forEach(q => {
    const row = document.createElement('div');
    row.className = 'list-item';
    const who = document.createElement('div');
    who.className = 'who';
    who.textContent = q.answer === 'A' ? CONFIG.partnerA : CONFIG.partnerB;
    const text = document.createElement('div');
    text.className = 'text';
    text.textContent = q.text;
    row.appendChild(who);
    row.appendChild(text);
    els.listItems.appendChild(row);
  });
}

els.showListBtn.addEventListener('click', () => {
  renderList();
  els.quizCard.classList.add('hidden');
  els.resultsCard.classList.add('hidden');
  document.getElementById('tabs').classList.add('hidden');
  els.listCard.classList.remove('hidden');
});

els.backToQuizBtn.addEventListener('click', () => {
  els.listCard.classList.add('hidden');
  document.getElementById('tabs').classList.remove('hidden');
  els.quizCard.classList.remove('hidden');
});

/* ---------- init ---------- */
resetPool();
drawRound();
buildTabs();
renderQuote();
</script>
</body>
</html>
